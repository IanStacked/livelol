# everythingdev project manifest (SPEC-project-manifest).
# The operator reads *health*, never raw errors. The chief-of-staff digest and
# daily-report skill consume this file + STATUS.md + daily-reports/.

project: leaguehelper
repo: IanStacked/league-draft-prep-helper
description: LiveLOL - a Discord bot that tracks League of Legends ranked progress in real time.

escalate_at: T3

pipelines:
  review_scoring: true
  chief_of_staff: true
  daily_brief:    true
  incident:       false

error_sink:
  kind: none          # Sentry is the live error path (utils/sentry_config.py).
  ref:  ""            # flip to self-hosted + a sink URL to dual-run; SINK_TOKEN via env only.

risk:
  watch_window: 30m
  bubble_ups_dir: ./bubble-ups

stack:
  runtime: python 3.12
  database: firestore
  host: aws-ec2 (docker)
  error_handler: sentry

health:
  check: ./scripts/health.sh   # emits the §4 health JSON; errors block stays null (kind: none)
  last: null
