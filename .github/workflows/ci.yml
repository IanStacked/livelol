name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Pytest
        run: uv run pytest

  # Validate the Dockerfile builds on every PR (build only, no push), so a broken
  # image is caught BEFORE it can merge to main. On push to main the deploy job
  # below does the real build+push, so this PR-only gate never double-builds there.
  docker-build:
    name: Validate Docker build (no push)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build image without pushing
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: league-bot:pr-${{ github.sha }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Two tags from one build: :latest is what the box pulls, and an
          # immutable :<commit-sha> so every deploy leaves a named rollback
          # target. Rolling back = re-running a prior :<sha> (see README).
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/league-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/league-bot:${{ github.sha }}
          platforms: linux/amd64
      
      - name: Deploy to AWS EC2 and Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          RIOT_KEY: ${{ secrets.RIOT_API_KEY }}
          FIREBASE_CREDS: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SINK_URL: ${{ secrets.SINK_URL }}
          SINK_TOKEN: ${{ secrets.SINK_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DISCORD_KEY, RIOT_KEY, FIREBASE_CREDS, SENTRY_DSN, SINK_URL, SINK_TOKEN
          script: |
            echo "DISCORD_PUBLIC_KEY=$DISCORD_KEY" > .env
            echo "RIOT_API_KEY=$RIOT_KEY" >> .env
            echo "FIREBASE_CREDENTIALS_BASE64=$FIREBASE_CREDS" >> .env
            echo "SENTRY_DSN=$SENTRY_DSN" >> .env
            echo "SINK_URL=$SINK_URL" >> .env
            echo "SINK_TOKEN=$SINK_TOKEN" >> .env
            echo "ENV="production"" >> .env
            sudo docker stop my-bot || true
            sudo docker rm my-bot || true
            # Reclaim only dangling/untagged layers. NOT `system prune -af`,
            # which would delete the :<sha> images that are our rollback targets.
            sudo docker image prune -f
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/league-bot:latest
            sudo docker run -d \
              --restart always \
              --env-file .env \
              --name my-bot \
              ${{ secrets.DOCKER_USERNAME }}/league-bot:latest
            echo "Waiting for initialization sequence..."
            LOG_STEPS=(
              "Sentry tracking initialized in production mode"
              "Firebase initialized successfully"
              "Persistent HTTP Session created"
              "Loaded cog: management"
              "Loaded cog: leaderboard"
              "Loaded cog: admin"
              "Background update task started"
              "Heartbeat task started"
              "Loaded cog: background"
              "Loaded cog: track"
              "Bot connected as LiveLOL"
              "Starting background update loop"
            )
            for step in "${LOG_STEPS[@]}"; do
              echo "Checking for: $step..."
              if timeout 20s sudo docker logs -f my-bot 2>&1 | grep -q -m 1 "$step"; then
                echo "✅ $step"
              else
                echo "❌ Failed to find '$step' in time."
                sudo docker logs my-bot
                exit 1
              fi
            done
            echo "🚀 Deployment fully verified. All systems operational."